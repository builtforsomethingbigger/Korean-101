<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Korean Course" />
    <title>30-Day Korean Course</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #ffffff;
        color: #1a1a1a;
        -webkit-font-smoothing: antialiased;
      }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f4;
        --color-background-tertiary: #f0efeb;
        --color-text-primary: #1a1a1a;
        --color-text-secondary: #6b7280;
        --color-text-tertiary: #9ca3af;
        --color-border-tertiary: rgba(0,0,0,0.12);
        --color-border-secondary: rgba(0,0,0,0.22);
        --color-border-primary: rgba(0,0,0,0.35);
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --border-radius-xl: 16px;
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-serif: Georgia, serif;
        --font-mono: 'Courier New', monospace;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #1a1a1a; color: #f5f5f4; }
        :root {
          --color-background-primary: #1a1a1a;
          --color-background-secondary: #2a2a2a;
          --color-background-tertiary: #222222;
          --color-text-primary: #f5f5f4;
          --color-text-secondary: #a3a3a3;
          --color-text-tertiary: #737373;
          --color-border-tertiary: rgba(255,255,255,0.1);
          --color-border-secondary: rgba(255,255,255,0.18);
          --color-border-primary: rgba(255,255,255,0.28);
        }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
